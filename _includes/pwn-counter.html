<p><strong>Boxes Pwned:</strong> <span id="pwn-counter-value">0</span></p>

<script>
(function () {
  // ↓↓↓ UPDATE THIS NUMBER EVERY TIME YOU SOLVE A NEW CHALLENGE ↓↓↓
  var PWN_COUNT = 27;
  // ↑↑↑ UPDATE THIS NUMBER EVERY TIME YOU SOLVE A NEW CHALLENGE ↑↑↑

  function runCounter() {
    var el = document.getElementById('pwn-counter-value');
    if (!el) return;

    var duration = 1200;
    var start = null;

    function step(timestamp) {
      if (!start) start = timestamp;
      var progress = Math.min((timestamp - start) / duration, 1);
      var eased = 1 - Math.pow(1 - progress, 3);
      var current = Math.floor(eased * PWN_COUNT);
      el.textContent = current;
      if (progress < 1) {
        window.requestAnimationFrame(step);
      } else {
        el.textContent = PWN_COUNT;
      }
    }

    if (PWN_COUNT > 0) {
      window.requestAnimationFrame(step);
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', runCounter);
  } else {
    runCounter();
  }
})();
</script>
