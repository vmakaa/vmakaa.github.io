<div class="pwn-counter-wrap">
  <div id="pwn-counter" class="pwn-counter-number">0</div>
  <div class="pwn-counter-label">Boxes Pwned</div>
</div>

<style>
.pwn-counter-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  margin: 2rem 0;
  padding: 1.5rem;
  border: 1px solid #3a3a3a;
  border-radius: 12px;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
}
.pwn-counter-number {
  font-size: 4rem;
  font-weight: 800;
  font-family: 'SFMono-Regular', Consolas, monospace;
  color: #00ff9c;
  text-shadow: 0 0 12px rgba(0, 255, 156, 0.5);
  line-height: 1;
}
.pwn-counter-label {
  margin-top: 0.5rem;
  font-size: 0.9rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: #8a8a8a;
}
</style>

<script>
(function () {
  // ↓↓↓ UPDATE THIS NUMBER EVERY TIME YOU SOLVE A NEW CHALLENGE ↓↓↓
  var PWN_COUNT = 16;
  // ↑↑↑ UPDATE THIS NUMBER EVERY TIME YOU SOLVE A NEW CHALLENGE ↑↑↑

  function runCounter() {
    var el = document.getElementById('pwn-counter');
    if (!el) return;

    var duration = 1200;
    var start = null;

    function step(timestamp) {
      if (!start) start = timestamp;
      var progress = Math.min((timestamp - start) / duration, 1);
      var eased = 1 - Math.pow(1 - progress, 3);
      var current = Math.floor(eased * PWN_COUNT);
      el.textContent = current;
      if (progress < 1) {
        window.requestAnimationFrame(step);
      } else {
        el.textContent = PWN_COUNT;
      }
    }

    if (PWN_COUNT > 0) {
      window.requestAnimationFrame(step);
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', runCounter);
  } else {
    runCounter();
  }
})();
</script>
